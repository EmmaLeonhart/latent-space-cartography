name: "Publish and Fetch Review"

# AUTO-SUBMIT DISABLED — Post 1127 has Strong Accept. Do NOT supersede.
# No triggers. This workflow cannot run.
on: []

permissions:
  contents: write

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    outputs:
      post_id: ${{ steps.submit.outputs.post_id }}
      paper_id: ${{ steps.submit.outputs.paper_id }}
      submitted: ${{ steps.submit.outputs.submitted }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install fpdf2

      - name: Generate PDF
        run: python scripts/generate_pdf.py

      - name: Check if PDF changed
        id: pdf_check
        run: |
          if git diff --quiet paper.pdf 2>/dev/null; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit PDF if changed
        if: steps.pdf_check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add paper.pdf
          git commit -m "Auto-generate paper.pdf from paper.md"
          git push

      - name: Compute content hash
        id: content_hash
        run: |
          HASH=$(cat paper.md SKILL.md | sha256sum | cut -d' ' -f1)
          echo "hash=$HASH" >> "$GITHUB_OUTPUT"

      - name: Check if submission needed
        id: submit_check
        run: |
          if [ -f .last_submitted_hash ] && [ "$(cat .last_submitted_hash)" = "${{ steps.content_hash.outputs.hash }}" ]; then
            echo "needed=false" >> "$GITHUB_OUTPUT"
          else
            echo "needed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Submit to clawRxiv
        id: submit
        if: steps.submit_check.outputs.needed == 'true'
        env:
          CLAWRXIV_API_KEY: ${{ secrets.CLAWRXIV_API_KEY }}
        run: |
          python - <<'PYEOF'
          import json, re, urllib.request, os, sys

          API_KEY = os.environ.get("CLAWRXIV_API_KEY", "")
          if not API_KEY:
              print("No CLAWRXIV_API_KEY set — skipping submission")
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write("submitted=false\n")
              sys.exit(0)

          supersedes = "${{ inputs.supersedes }}".strip()

          # Check for existing post ID to supersede automatically
          if not supersedes:
              try:
                  with open(".post_id", "r") as f:
                      supersedes = f.read().strip()
                      print(f"Auto-superseding post {supersedes}")
              except FileNotFoundError:
                  pass

          with open("paper.md", "r") as f:
              content = f.read()
          with open("SKILL.md", "r") as f:
              skill = f.read()

          abstract_match = re.search(r'## Abstract\s*\n(.*?)(?=\n## [0-9])', content, re.DOTALL)
          abstract = abstract_match.group(1).strip() if abstract_match else content[:500]

          payload = {
              "title": "Latent Space Cartography Applied to Wikidata: Relational Displacement Analysis Reveals a Silent Tokenizer Defect in mxbai-embed-large",
              "abstract": abstract,
              "content": content,
              "skill_md": skill,
              "tags": ["embedding-spaces", "knowledge-graphs", "vector-arithmetic", "tokenizer-failures", "neuro-symbolic"],
              "human_names": ["Emma Leonhart"],
          }
          if supersedes:
              payload["supersedes"] = int(supersedes)

          data = json.dumps(payload, ensure_ascii=False).encode("utf-8")
          req = urllib.request.Request(
              "https://clawrxiv.io/api/posts",
              data=data,
              headers={
                  "Content-Type": "application/json",
                  "Authorization": f"Bearer {API_KEY}",
              },
              method="POST",
          )
          try:
              with urllib.request.urlopen(req) as resp:
                  result = json.loads(resp.read())
                  print(f"Published: {json.dumps(result, indent=2)}")
                  post_id = str(result.get("id", ""))
                  paper_id = str(result.get("paper_id", ""))
                  with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                      f.write(f"post_id={post_id}\n")
                      f.write(f"paper_id={paper_id}\n")
                      f.write("submitted=true\n")
          except urllib.error.HTTPError as e:
              body = e.read().decode()
              print(f"Submission failed ({e.code}): {body}", file=sys.stderr)
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write("submitted=false\n")
              sys.exit(1)
          PYEOF

      - name: Save post ID and submission hash
        if: steps.submit.outputs.submitted == 'true'
        run: |
          echo "${{ steps.submit.outputs.post_id }}" > .post_id
          echo "${{ steps.submit.outputs.paper_id }}" > .paper_id
          echo "${{ steps.content_hash.outputs.hash }}" > .last_submitted_hash
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .post_id .paper_id .last_submitted_hash
          git commit -m "Record submission: post ${{ steps.submit.outputs.post_id }} (paper ${{ steps.submit.outputs.paper_id }})" || true
          git push || true

  fetch-review:
    needs: generate-and-publish
    if: needs.generate-and-publish.outputs.submitted == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.ref_name }}

      - name: Pull latest (in case publish job pushed)
        run: git pull --rebase origin ${{ github.ref_name }} || true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Wait for AI peer review and fetch
        env:
          POST_ID: ${{ needs.generate-and-publish.outputs.post_id }}
          PAPER_ID: ${{ needs.generate-and-publish.outputs.paper_id }}
        run: |
          python - <<'PYEOF'
          import json, urllib.request, os, sys, time
          from datetime import datetime, timezone

          POST_ID = os.environ["POST_ID"]
          PAPER_ID = os.environ.get("PAPER_ID", "unknown")
          if not POST_ID:
              print("No post ID — cannot fetch review")
              sys.exit(1)

          os.makedirs("reviews", exist_ok=True)

          # Retry schedule: every 15min, up to 2 hours total
          RETRY_INTERVAL = 15 * 60  # 15 minutes
          MAX_WAIT = 2 * 60 * 60    # 2 hours total
          elapsed = 0
          attempt = 0

          while elapsed <= MAX_WAIT:
              attempt += 1
              print(f"\nAttempt {attempt}: fetching AI review for post {POST_ID}...")
              url = f"https://clawrxiv.io/api/posts/{POST_ID}/review"
              try:
                  req = urllib.request.Request(url)
                  with urllib.request.urlopen(req) as resp:
                      data = json.loads(resp.read())
                      review = data.get("review")

                      if review:
                          rating = review.get("rating", "Unknown")
                          model = review.get("model", "Unknown")
                          print(f"Found review! Rating: {rating}, Model: {model}")

                          ts = datetime.now(timezone.utc).strftime("%Y%m%d_%H%M%S")

                          # Save raw JSON
                          review_file = f"reviews/review_{ts}.json"
                          with open(review_file, "w") as f:
                              json.dump(review, f, indent=2)
                          print(f"Saved JSON to {review_file}")

                          # Save human-readable markdown
                          md_file = f"reviews/review_{ts}.md"
                          with open(md_file, "w") as f:
                              f.write(f"# AI Peer Review — Post {POST_ID}\n\n")
                              f.write(f"**Paper ID:** {PAPER_ID}\n")
                              f.write(f"**Rating:** {rating}\n")
                              f.write(f"**Model:** {model}\n")
                              f.write(f"**Reviewed:** {review.get('createdAt', '')}\n\n")
                              f.write(f"## Summary\n\n{review.get('summary', '')}\n\n")
                              f.write("## Strengths\n\n")
                              for p in review.get("pros", []):
                                  f.write(f"- {p}\n")
                              f.write("\n## Weaknesses\n\n")
                              for c in review.get("cons", []):
                                  f.write(f"- {c}\n")
                              f.write(f"\n## Justification\n\n{review.get('justification', '')}\n")
                          print(f"Saved markdown to {md_file}")

                          sys.exit(0)
                      else:
                          print("Review field empty.")

              except urllib.error.HTTPError as e:
                  if e.code == 404:
                      print("No review yet (404).")
                  else:
                      print(f"HTTP error {e.code}: {e.read().decode()}")
              except Exception as e:
                  print(f"Error: {e}")

              if elapsed + RETRY_INTERVAL > MAX_WAIT:
                  break

              print(f"Waiting {RETRY_INTERVAL // 60} minutes before retry...")
              time.sleep(RETRY_INTERVAL)
              elapsed += RETRY_INTERVAL

          print(f"\nNo AI review after {elapsed // 60} minutes ({attempt} attempts). Giving up.")
          with open("reviews/no_review_yet.txt", "w") as f:
              f.write(f"No AI review for post {POST_ID} after {attempt} attempts over {elapsed // 60} minutes.\n")
              f.write(f"Last check: {datetime.now(timezone.utc).isoformat()}\n")
          PYEOF

      - name: Commit review if found
        run: |
          if [ -d reviews ] && [ "$(ls -A reviews 2>/dev/null)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add reviews/
            git commit -m "Fetch peer review for post ${{ needs.generate-and-publish.outputs.post_id }}" || true
            git push || true
          fi
