name: Reproduce mxbai Collisions

# Full reproducibility experiment for the mxbai-embed-large [UNK] token
# defect. On each run:
#
#   1. Pulls a stratified sample of ~600-900 Wikidata settlements with
#      native-language labels (Czech, Polish, Vietnamese, German, French,
#      Romanian, Hungarian, Turkish, Slovak, Portuguese, Spanish,
#      Icelandic), which reliably contain diacritics.
#   2. Pulls ~300 English-labelled settlements as an ASCII control.
#   3. Embeds everything via a fresh `ollama pull mxbai-embed-large`.
#   4. Computes pairwise cosine similarities inside each group and
#      across groups, reports collision counts at threshold 0.95,
#      prints top example pairs.
#   5. Fails the run if the diacritical collision rate drops below 5%
#      or the ASCII control rate rises above 2% — either would mean the
#      defect has been fixed or something else is wrong.
#
# This is a real statistical experiment, not a canary check. Typical
# output is ~60,000+ cross-entity collisions (~28% of diacritical pairs)
# vs ~0 ASCII-control collisions.
#
# Triggers:
#   - Daily cron (07:13 UTC) — reverify against the current Ollama
#     registry version of mxbai-embed-large.
#   - On push to the scan script or this workflow.
#   - Manual dispatch.

on:
  schedule:
    - cron: "13 7 * * *"
  push:
    branches: [master, main]
    paths:
      - "scripts/wikidata_collision_scan.py"
      - ".github/workflows/collisions.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: collisions
  cancel-in-progress: false

jobs:
  reproduce:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install numpy
        run: pip install --quiet numpy

      - name: Install Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama --version

      - name: Start Ollama daemon
        run: |
          nohup ollama serve > ollama.log 2>&1 &
          for i in $(seq 1 30); do
            if curl -sf http://localhost:11434/api/tags > /dev/null; then
              echo "Ollama is up"
              break
            fi
            sleep 1
          done

      - name: Pull mxbai-embed-large
        run: ollama pull mxbai-embed-large

      - name: Run Wikidata collision scan
        run: python scripts/wikidata_collision_scan.py

      - name: Upload summary artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wikidata-collision-summary
          path: wikidata_collision_summary.json
          retention-days: 90
