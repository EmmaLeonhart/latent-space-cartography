name: Reproduce mxbai Collisions

# Runs scripts/demo_collisions.py against a live Ollama instance with
# mxbai-embed-large pulled from the registry. This is the public,
# replicable demonstration of the [UNK] tokenizer defect — the same
# script that backs the GitHub Pages explainer at docs/index.html.
#
# Triggers:
#   - Daily cron (07:13 UTC) so the defect is re-verified against the
#     current published model weights on Ollama's registry.
#   - On push when the experiment script or this workflow change.
#   - Manual dispatch for ad-hoc runs.

on:
  schedule:
    - cron: "13 7 * * *"
  push:
    branches: [master, main]
    paths:
      - "scripts/demo_collisions.py"
      - ".github/workflows/collisions.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: collisions
  cancel-in-progress: false

jobs:
  reproduce:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama --version

      - name: Start Ollama daemon
        run: |
          nohup ollama serve > ollama.log 2>&1 &
          # Wait for the daemon to accept requests
          for i in $(seq 1 30); do
            if curl -sf http://localhost:11434/api/tags > /dev/null; then
              echo "Ollama is up"
              break
            fi
            sleep 1
          done

      - name: Pull mxbai-embed-large
        run: ollama pull mxbai-embed-large

      - name: Run collision experiment
        run: python scripts/demo_collisions.py

      - name: Show result
        run: |
          echo "=== collisions.csv (freshly generated) ==="
          cat collisions.csv

      - name: Verify defect is still present
        run: |
          # This is the core assertion. We DO NOT auto-commit the CSV,
          # because Ollama's embedding pipeline has ~1e-4 run-to-run
          # jitter that can flip values sitting near rounding boundaries
          # and produce daily noise-commits. What actually matters is the
          # set of (text_a, text_b) pairs that cross the 0.95 collision
          # threshold. If that set changes, the mxbai defect has finally
          # been fixed (or regressed) and a human should look.

          python - <<'PY'
          import csv, sys

          EXPECTED_COLLISIONS = {
              ("cross_collision", "Aikanã", "kugyō"),
              ("cross_collision", "Djazaïr", "Éire"),
              ("cross_collision", "Filasṭīn", "Jinmyōchō"),
              ("cross_collision", "Filasṭīn", "Éire"),
              ("cross_collision", "Hokkaidō", "Jinmyōchō"),
              ("cross_collision", "Hokkaidō", "Shōtai"),
              ("cross_collision", "Hokkaidō", "Éire"),
              ("cross_collision", "Jinmyōchō", "kugyō"),
              ("cross_collision", "Shōtoku", "Jinmyōchō"),
              ("cross_collision", "Shōtoku", "România"),
              ("cross_collision", "kugyō", "Djazaïr"),
              ("cross_collision", "naïve", "Zürich"),
          }

          with open("collisions.csv", encoding="utf-8") as f:
              rows = list(csv.DictReader(f))

          actual_collisions = {
              (r["category"], r["text_a"], r["text_b"])
              for r in rows
              if r["collision"] == "YES"
          }

          total = len(rows)
          print(f"{len(actual_collisions)}/{total} pairs collide at cosine >= 0.95")

          missing = EXPECTED_COLLISIONS - actual_collisions
          unexpected = actual_collisions - EXPECTED_COLLISIONS

          if missing:
              print(f"FAIL: expected collisions that did not fire: {missing}")
          if unexpected:
              print(f"FAIL: unexpected new collisions: {unexpected}")

          if missing or unexpected:
              print("The mxbai defect set has changed — investigate.")
              sys.exit(1)

          print("✓ Defect is still present, all 12 expected collisions fired.")
          PY
